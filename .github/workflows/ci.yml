name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm install --no-save --no-package-lock @playwright/test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui
      - run: npm run vibe:config-audit --silent
