name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run vibe:codex-wrapper-audit
      - run: npm run vibe:init-shard-audit
      - run: npm run vibe:interview-shard-audit
      - run: npm run vibe:iterate-shard-audit
      - run: npm run vibe:review-shard-audit
      - run: npm run vibe:sprint-mode-audit
      - run: npm run vibe:sync-audit
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run vibe:test-ui
      - run: npm run vibe:config-audit --silent
